<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
	<title id="title">Tahapan Manajemen Proyek RentalHub</title>
	<desc id="desc">Diagram lima tahapan proyek RentalHub: Perencanaan, Database, Backend, Frontend, dan Pengujian.</desc>

	<defs>
		<style>
			.title { font-family: Arial, Helvetica, sans-serif; font-size: 52px; font-weight: 700; fill: #1f1f1f; }
			.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 500; fill: #6f6f6f; }
			.phase-label { font-family: Arial, Helvetica, sans-serif; font-size: 38px; font-weight: 700; }
			.phase-sub { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 500; fill: #8a8a8a; }
			.step-num { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #ffffff; }
			.step-name { font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 700; fill: #ffffff; }
			.bullet { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 500; fill: #2b2b2b; }
			.footer { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 500; fill: #9a9a9a; }
		</style>
		<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<polygon points="0,0 10,5 0,10" fill="#b4b4b4" />
		</marker>
	</defs>

	<rect width="1600" height="560" fill="#f2f2f2" />

	<text x="800" y="62" text-anchor="middle" class="title">Tahapan Manajemen Proyek</text>
	<text x="800" y="96" text-anchor="middle" class="subtitle">Sistem Rental Kendaraan RentalHub</text>

	<!-- Connector lines -->
	<line x1="255" y1="170" x2="433" y2="170" stroke="#b9b9b9" stroke-width="4" marker-end="url(#arrow)" />
	<line x1="553" y1="170" x2="731" y2="170" stroke="#b9b9b9" stroke-width="4" marker-end="url(#arrow)" />
	<line x1="851" y1="170" x2="1029" y2="170" stroke="#b9b9b9" stroke-width="4" marker-end="url(#arrow)" />
	<line x1="1149" y1="170" x2="1327" y2="170" stroke="#b9b9b9" stroke-width="4" marker-end="url(#arrow)" />

	<!-- Top badges -->
	<g transform="translate(120,108)">
		<polygon points="54,0 95,23 95,69 54,92 13,69 13,23" fill="#a56a14" stroke="#d6d6d6" stroke-width="8" />
		<text x="54" y="36" text-anchor="middle" class="step-num">01</text>
		<text x="54" y="66" text-anchor="middle" class="step-name">Perencanaan</text>
	</g>

	<g transform="translate(418,108)">
		<polygon points="54,0 95,23 95,69 54,92 13,69 13,23" fill="#1c8f78" stroke="#d6d6d6" stroke-width="8" />
		<text x="54" y="36" text-anchor="middle" class="step-num">02</text>
		<text x="54" y="66" text-anchor="middle" class="step-name">Database</text>
	</g>

	<g transform="translate(716,108)">
		<polygon points="54,0 95,23 95,69 54,92 13,69 13,23" fill="#2d73c8" stroke="#d6d6d6" stroke-width="8" />
		<text x="54" y="36" text-anchor="middle" class="step-num">03</text>
		<text x="54" y="66" text-anchor="middle" class="step-name">Backend</text>
	</g>

	<g transform="translate(1014,108)">
		<polygon points="54,0 95,23 95,69 54,92 13,69 13,23" fill="#6259c9" stroke="#d6d6d6" stroke-width="8" />
		<text x="54" y="36" text-anchor="middle" class="step-num">04</text>
		<text x="54" y="66" text-anchor="middle" class="step-name">Frontend</text>
	</g>

	<g transform="translate(1312,108)">
		<polygon points="54,0 95,23 95,69 54,92 13,69 13,23" fill="#ab4b22" stroke="#d6d6d6" stroke-width="8" />
		<text x="54" y="36" text-anchor="middle" class="step-num">05</text>
		<text x="54" y="66" text-anchor="middle" class="step-name">Pengujian</text>
	</g>

	<!-- Phase labels -->
	<text x="174" y="252" text-anchor="middle" class="phase-label" fill="#995e0f">Perencanaan</text>
	<text x="174" y="282" text-anchor="middle" class="phase-sub">Planning</text>

	<text x="472" y="252" text-anchor="middle" class="phase-label" fill="#1c8f78">Database</text>
	<text x="472" y="282" text-anchor="middle" class="phase-sub">Data Design</text>

	<text x="770" y="252" text-anchor="middle" class="phase-label" fill="#2d73c8">Backend</text>
	<text x="770" y="282" text-anchor="middle" class="phase-sub">Laravel Development</text>

	<text x="1068" y="252" text-anchor="middle" class="phase-label" fill="#6259c9">Frontend</text>
	<text x="1068" y="282" text-anchor="middle" class="phase-sub">Blade + Tailwind</text>

	<text x="1366" y="252" text-anchor="middle" class="phase-label" fill="#ab4b22">Pengujian</text>
	<text x="1366" y="282" text-anchor="middle" class="phase-sub">Testing</text>

	<!-- Detail cards -->
	<g transform="translate(45,304)">
		<rect x="0" y="0" rx="12" ry="12" width="280" height="190" fill="#fff" stroke="#a56a14" stroke-width="2" />
		<rect x="0" y="0" rx="12" ry="12" width="280" height="44" fill="#a56a14" />
		<text x="140" y="30" text-anchor="middle" class="step-name">Perencanaan</text>

		<text x="12" y="74" class="bullet">&gt; Analisis kebutuhan customer/admin</text>
		<text x="12" y="101" class="bullet">&gt; Alur booking, payment, waiting list</text>
		<text x="12" y="128" class="bullet">&gt; Rancangan halaman Blade &amp; UX</text>
		<text x="12" y="155" class="bullet">&gt; Rencana notifikasi &amp; scheduler</text>

		<circle cx="12" cy="178" r="10" fill="#f2f2f2" stroke="#a56a14" stroke-width="2" />
		<circle cx="268" cy="178" r="10" fill="#f2f2f2" stroke="#a56a14" stroke-width="2" />
	</g>

	<g transform="translate(343,304)">
		<rect x="0" y="0" rx="12" ry="12" width="280" height="190" fill="#fff" stroke="#1c8f78" stroke-width="2" />
		<rect x="0" y="0" rx="12" ry="12" width="280" height="44" fill="#1c8f78" />
		<text x="140" y="30" text-anchor="middle" class="step-name">Database</text>

		<text x="12" y="74" class="bullet">&gt; Skema user, vehicle, booking, review</text>
		<text x="12" y="101" class="bullet">&gt; Relasi status booking &amp; payment</text>
		<text x="12" y="128" class="bullet">&gt; Migrasi aman SQLite dan MySQL</text>
		<text x="12" y="155" class="bullet">&gt; Integrasi upload public storage</text>

		<circle cx="12" cy="178" r="10" fill="#f2f2f2" stroke="#1c8f78" stroke-width="2" />
		<circle cx="268" cy="178" r="10" fill="#f2f2f2" stroke="#1c8f78" stroke-width="2" />
	</g>

	<g transform="translate(641,304)">
		<rect x="0" y="0" rx="12" ry="12" width="280" height="190" fill="#fff" stroke="#2d73c8" stroke-width="2" />
		<rect x="0" y="0" rx="12" ry="12" width="280" height="44" fill="#2d73c8" />
		<text x="140" y="30" text-anchor="middle" class="step-name">Backend</text>

		<text x="12" y="74" class="bullet">&gt; Laravel 12 auth, policy, middleware</text>
		<text x="12" y="101" class="bullet">&gt; Flow booking &amp; verifikasi payment</text>
		<text x="12" y="128" class="bullet">&gt; Scheduler cancel unpaid + reminder</text>
		<text x="12" y="155" class="bullet">&gt; Queue email &amp; aktivasi waiting list</text>

		<circle cx="12" cy="178" r="10" fill="#f2f2f2" stroke="#2d73c8" stroke-width="2" />
		<circle cx="268" cy="178" r="10" fill="#f2f2f2" stroke="#2d73c8" stroke-width="2" />
	</g>

	<g transform="translate(939,304)">
		<rect x="0" y="0" rx="12" ry="12" width="280" height="190" fill="#fff" stroke="#6259c9" stroke-width="2" />
		<rect x="0" y="0" rx="12" ry="12" width="280" height="44" fill="#6259c9" />
		<text x="140" y="30" text-anchor="middle" class="step-name">Frontend</text>

		<text x="12" y="74" class="bullet">&gt; Blade template + komponen layout</text>
		<text x="12" y="101" class="bullet">&gt; Tailwind + Alpine.js + Vite assets</text>
		<text x="12" y="128" class="bullet">&gt; Form booking, upload, dashboard</text>
		<text x="12" y="155" class="bullet">&gt; Integrasi badge status dan alert UI</text>

		<circle cx="12" cy="178" r="10" fill="#f2f2f2" stroke="#6259c9" stroke-width="2" />
		<circle cx="268" cy="178" r="10" fill="#f2f2f2" stroke="#6259c9" stroke-width="2" />
	</g>

	<g transform="translate(1237,304)">
		<rect x="0" y="0" rx="12" ry="12" width="280" height="190" fill="#fff" stroke="#ab4b22" stroke-width="2" />
		<rect x="0" y="0" rx="12" ry="12" width="280" height="44" fill="#ab4b22" />
		<text x="140" y="30" text-anchor="middle" class="step-name">Pengujian</text>

		<text x="12" y="74" class="bullet">&gt; Feature test booking &amp; payment flow</text>
		<text x="12" y="101" class="bullet">&gt; Uji scheduler, queue, email log</text>
		<text x="12" y="128" class="bullet">&gt; Validasi waiting list &amp; status sewa</text>
		<text x="12" y="155" class="bullet">&gt; Debug dan regression test Laravel</text>

		<circle cx="12" cy="178" r="10" fill="#f2f2f2" stroke="#ab4b22" stroke-width="2" />
		<circle cx="268" cy="178" r="10" fill="#f2f2f2" stroke="#ab4b22" stroke-width="2" />
	</g>

	<text x="800" y="540" text-anchor="middle" class="footer">Tech Stack: Laravel 12 - SQLite/MySQL - Blade - Tailwind CSS - Alpine.js - PHPUnit - XAMPP</text>
</svg>
